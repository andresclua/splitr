[build]
  command = "pnpm install && pnpm --filter app build && mkdir -p app/.netlify/static"
  publish = "app/.netlify/static"
  functions = "app/.netlify/functions-internal"

[build.environment]
  NODE_VERSION = "20"
  NITRO_PRESET = "netlify"

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/server"
  status = 200
