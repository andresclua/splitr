[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "https://koryla-astro-demo-example.netlify.app/*"
  to = "https://astro-demo.koryla.com/:splat"
  status = 301
  force = true

[dev]
  command = "npm run dev"
  targetPort = 4321
  port = 8889
  autoLaunch = false

[dev.environment]
  KORYLA_API_KEY = "sk_live_..."   # paste your key from Koryla dashboard → Settings → API Keys
  KORYLA_API_URL = "http://localhost:3000"

# Edge function intercepts these paths before static files are served
[[edge_functions]]
  function = "koryla"
  path = "/"

[[edge_functions]]
  function = "koryla"
  path = "/pricing"
